name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    name: Validate repository
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Parse PowerShell scripts
        shell: pwsh
        run: |
          $failed = $false
          Get-ChildItem -Recurse -Filter *.ps1 | ForEach-Object {
            $errors = $null
            [System.Management.Automation.Language.Parser]::ParseFile($_.FullName, [ref]$null, [ref]$errors) > $null
            if ($errors) {
              $failed = $true
              $path = $_.FullName
              $errors | ForEach-Object {
                "{0}:{1}: {2}" -f $path, $_.Extent.StartLineNumber, $_.Message
              }
            }
          }
          if ($failed) { exit 1 }

      - name: Parse JSON configuration
        shell: pwsh
        run: |
          Get-Content configs\platform.json -Raw | ConvertFrom-Json | Out-Null
          Get-Content configs\topology.json -Raw | ConvertFrom-Json | Out-Null
          Get-Content configs\sync-profiles.json -Raw | ConvertFrom-Json | Out-Null
          Get-Content configs\local.example.json -Raw | ConvertFrom-Json | Out-Null

      - name: Check CLI parameter contracts
        shell: pwsh
        run: |
          .\tests\cli-parameter-contracts.ps1

      - name: Run CLI smoke tests
        shell: pwsh
        run: |
          .\tests\cli-smoke.ps1

      - name: Check bootstrap shell syntax
        shell: bash
        run: |
          bash -n \
            bootstrap/base/setup-base.sh \
            bootstrap/frontend/setup-frontend.sh \
            bootstrap/frontend/browser-tools.sh \
            bootstrap/backend/setup-backend.sh \
            bootstrap/agent/setup-agent.sh \
            bootstrap/common/common.sh

      - name: Check Markdown local links
        shell: pwsh
        run: |
          $failed = $false
          $files = Get-ChildItem -Recurse -Filter *.md -File
          foreach ($file in $files) {
            $text = Get-Content -LiteralPath $file.FullName -Raw
            foreach ($match in [regex]::Matches($text, "\[[^\]]+\]\(([^)]+)\)")) {
              $target = $match.Groups[1].Value.Trim()
              if ($target.StartsWith("<") -and $target.EndsWith(">")) {
                $target = $target.Substring(1, $target.Length - 2)
              }
              if ($target -match "^[a-zA-Z][a-zA-Z0-9+.-]*:" -or $target.StartsWith("#")) {
                continue
              }
              $pathOnly = ($target -split "#", 2)[0]
              if ([string]::IsNullOrWhiteSpace($pathOnly)) {
                continue
              }
              $resolved = [System.IO.Path]::GetFullPath((Join-Path $file.DirectoryName $pathOnly))
              if (-not (Test-Path -LiteralPath $resolved)) {
                $failed = $true
                "Missing link in {0}: {1} -> {2}" -f $file.FullName, $target, $resolved
              }
            }
          }
          if ($failed) { exit 1 }
