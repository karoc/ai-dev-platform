name: Feature request
description: Suggest an improvement to ADP-OS.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Use this for product or workflow improvements. For usage questions, use the Usage question template. For vulnerabilities, follow SECURITY.md. Do not include secrets, private keys, tokens, VM disks, ISO files, large logs, or private local paths that should not be public. See SUPPORT.md for scope boundaries.
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user problem should this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the behavior you want.
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - install
        - cli
        - vmware
        - networking
        - bootstrap
        - sync
        - browser-testing
        - workspace
        - validation
        - release-readiness
        - agent-native-workflow
        - docker-or-devcontainer
        - documentation
        - cross-platform
        - other
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: textarea
    id: notes
    attributes:
      label: Additional context
      description: Do not include secrets, private keys, tokens, VM disks, ISO files, or private local paths that should not be public.
  - type: checkboxes
    id: safety
    attributes:
      label: Safety check
      options:
        - label: I removed secrets, private keys, tokens, VM disks, ISO files, large logs, and private local paths from this request.
          required: true
